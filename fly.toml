app = "nse-edge-backend"
primary_region = "sin"  # Singapore — closest to NSE

[build]
  [build.args]
    PYTHON_VERSION = "3.11"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
