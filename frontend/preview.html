<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NSE Edge Preview - New Attractive Theme</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
/* ULTRA ATTRACTIVE v3: Ultramarine + Gold + Neon Glows - MAX VISIBILITY */
--bg: #f8f8ff; /* White cosmic - bright + glows pop */
  --s1: #111827;
  --s2: #1f2937;
  --s3: #374151;
  --s4: #4b5563;
  --b1: #6b7280;
  --b2: #9ca3af;
  /* Vibrant accents - emerald (go), crimson (st), amber (am) */
  --go: #10b981; /* Emerald 500 */
  --go-glow: #059669; /* Emerald 600 glow */
  --go-d: rgba(16,185,129,0.12); /* Subtle bg */
  --st: #ef4444; /* Red 500 */
  --st-glow: #dc2626; /* Red 600 */
  --st-d: rgba(239,68,68,0.12);
  --am: #f59e0b; /* Amber 500 */
  --am-d: rgba(245,158,11,0.12);
  --bl: #3b82f6; /* Blue 500 */
  --pu: #8b5cf6; /* Purple 500 */
  /* Crystal-clear text */
  --t0: #f8fafc; /* Slate 50 */
  --t1: #e2e8f0; /* Slate 200 */
  --t2: #cbd5e1; /* Slate 300 */
  --t3: #94a3b8; /* Slate 400 */
  /* Fonts */
  --fn: 'Inter', -apple-system, sans-serif;
  --fh: 'Syne', sans-serif;
}

.light {
  --bg: #f8fafc;
  --s1: #ffffff;
  --s2: #f1f5f9;
  --s3: #e2e8f0;
  --s4: #cbd5e1;
  --b1: #94a3b8;
  --b2: #64748b;
  --go: #059669;
  --st: #dc2626;
  --am: #d97706;
  --bl: #2563eb;
  --t0: #0f172a;
  --t1: #1e293b;
  --t2: #334155;
  --t3: #475569;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--fn);
  font-size: 16px; /* Upped from 12px for readability */
  background: var(--bg);
  color: var(--t0);
  height: 100vh;
  overflow: hidden;
  display: flex; flex-direction: column;
}

/* TOPBAR - Sleek gradient */
#tb {
  height: 42px; /* Taller for touch */
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  background: linear-gradient(180deg, var(--s1) 0%, var(--s2) 100%);
  border-bottom: 1px solid var(--b1);
  gap: 12px;
  font-size: 14px; /* Larger labels */
}
.logo { display: flex; align-items: center; gap: 10px; cursor: default; }
.logo-icon { width: 28px; height: 28px; filter: drop-shadow(0 0 8px rgba(16,185,129,0.4)); }
.logo-name { 
  font-family: var(--fh); 
  font-size: 18px; /* Bolder branding */
  font-weight: 800;
  background: linear-gradient(135deg, var(--go), var(--go-glow));
  -webkit-background-clip: text; background-clip: text;
}

/* GATES PREVIEW */
.gates-preview {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; padding: 24px; max-width: 1400px; margin: 0 auto;
}
.gate-card {
  border-radius: 16px; padding: 24px; border: 1px solid var(--b1);
  background: linear-gradient(145deg, rgba(255,255,255,0.05), transparent);
  backdrop-filter: blur(16px); transition: all 0.3s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  position: relative; overflow: hidden;
}
.gate-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--go), var(--st), var(--am), var(--bl));
}
.gate-card:hover {
  transform: translateY(-8px); border-color: var(--b2);
  box-shadow: 0 20px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
}

/* Gate header */
.gate-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.gate-num { 
  width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; font-family: var(--fh);
}
.gate-num.go { background: linear-gradient(135deg, var(--go), var(--go-glow)); color: #000; box-shadow: 0 0 24px var(--go-glow); }
.gate-num.st { background: linear-gradient(135deg, var(--st), var(--st-glow)); color: #fff; }
.gate-name { font-size: 16px; font-weight: 700; margin: 0; }
.gate-status { 
  font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 20px; 
  border: 1px solid; min-width: fit-content;
}
.gate-status.go { background: var(--go-d); color: var(--go); border-color: var(--go); }
.gate-status.st { background: var(--st-d); color: var(--st); border-color: var(--st); }

/* Progress bar */
.g-progress { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.1); overflow: hidden; margin: 12px 0; }
.g-fill { 
  height: 100%; 
  background: linear-gradient(90deg, var(--go-glow), var(--go)); 
  border-radius: 4px; transition: width 1s ease; 
  box-shadow: 0 0 16px var(--go-glow);
}

/* Gate details */
.g-details { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 14px; }
.g-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
.g-label { font-size: 12px; color: var(--t1); font-weight: 600; }
.g-value { font-weight: 700; }
.g-value.go { color: var(--go); }

/* Verdict hero */
.verdict-hero {
  background: linear-gradient(135deg, var(--go-glow), var(--go)); 
  border-radius: 20px; padding: 32px; text-align: center; margin: 32px 0;
  box-shadow: 0 24px 64px rgba(16,185,129,0.3);
  color: #000; font-weight: 800;
}
.verdict-hero h1 { font-size: 48px; font-family: var(--fh); margin-bottom: 12px; }
.verdict-hero p { font-size: 18px; opacity: 0.9; }

/* Spike preview */
.spike-preview { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 40px; }
.spike-card {
  border-radius: 20px; padding: 24px; border: 1px solid var(--b1);
  background: linear-gradient(145deg, rgba(16,185,129,0.1), rgba(255,255,255,0.05));
  backdrop-filter: blur(20px); transition: all 0.3s;
  position: relative; overflow: hidden;
}
.spike-card::before {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(16,185,129,0.15) 0%, transparent 70%);
  animation: float 6s ease-in-out infinite;
}
@keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(180deg); } }
.spike-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.spike-sym { font-size: 28px; font-weight: 800; font-family: var(--fh); }
.spike-score { 
  width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--go), var(--go-glow)); color: #000; font-size: 24px; font-weight: 800;
  box-shadow: 0 0 32px var(--go-glow);
}

.light {
  --go-glow: #047857;
  --st-glow: #b91c1c;
}
/* White cosmic: always bright clean */ --s1: #ffffff; --s2: #f9faff; --s3: #f1f5ff; --s4: #e8eeff; /* Lighter cosmic whites */
.light .verdict-hero { background: linear-gradient(135deg, #059669, #047857); }
.light .spike-card { background: linear-gradient(145deg, rgba(5,150,105,0.15), rgba(0,0,0,0.05)); }
</style>
</head>
<body>

<div class="gates-preview">
  <!-- Verdict Hero -->
  <div class="verdict-hero">
    <h1>EXECUTE</h1>
    <p>5/5 Gates Passed · Confidence 9.2/10 · Full Position</p>
  </div>

  <!-- Gate Cards (Sample) -->
  <div class="gate-card">
    <div class="gate-hdr">
      <div>
        <div class="gate-num go">1</div>
        <h3 class="gate-name">REGIME</h3>
        <div class="gate-status go">✓ PASS</div>
      </div>
      <div class="g-progress"><div class="g-fill" style="width:92%"></div></div>
    </div>
    <div class="g-details">
      <div class="g-row"><span class="g-label">VIX</span><span class="g-value go">12.8 LOW</span></div>
      <div class="g-row"><span class="g-label">VIX Δ</span><span class="g-value">-1.2%</span></div>
      <div class="g-row"><span class="g-label">FII Net</span><span class="g-value go">+₹2,450 Cr</span></div>
    </div>
  </div>

  <div class="gate-card">
    <div class="gate-hdr">
      <div>
        <div class="gate-num st">2</div>
        <h3 class="gate-name">SMART MONEY</h3>
        <div class="gate-status st">✗ FAIL</div>
      </div>
      <div class="g-progress"><div class="g-fill" style="width:67%"></div></div>
    </div>
  </div>

  <!-- Spike Card Preview -->
  <div class="spike-preview">
    <div class="spike-card">
      <div class="spike-header">
        <div class="spike-sym">HDFCBANK</div>
        <div class="spike-score">85</div>
      </div>
      <div style="font-size:14px;margin-bottom:12px">
        <span style="color:var(--go)">▲ LONG</span> · Vol 3.2× · +1.45% · Score 85 hi
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;font-size:12px">
        <div>Entry ₹1,248</div><div>SL ₹1,244</div><div>T1 ₹1,252</div><div>T2 ₹1,257</div>
      </div>
    </div>
  </div>
</div>

<script>
// Theme toggle demo
document.querySelector('#theme-tog')?.remove();
const t = document.createElement('button');
t.textContent = 'LIGHT';
t.style.cssText = 'padding:8px 16px;background:var(--go);color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin:20px auto;display:block;';
t.onclick = () => document.documentElement.classList.toggle('light');
document.body.append(t);

// Auto-toggle every 4s demo
setInterval(() => document.documentElement.classList.toggle('light'), 4000);
</script>

</body>
</html>
